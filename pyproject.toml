# Root pyproject is a NON-BUILDABLE workspace coordinator (uv "virtual workspace").
# Buildable packages live under apps/ and packages/. Each has its own pyproject.toml.

[tool.uv.workspace]
# Members are added as their pyproject.toml lands. Phase 0 ships asil-core, api, cli.
# Future members (per PLAN.md): apps/worker, packages/asil_{ingest,memory,temporal,
# replay,drift,reasoning,infra,eval}.
members = [
    "apps/api",
    "apps/cli",
    "packages/asil_core",
    "packages/asil_ingest",
    "packages/asil_memory",
]

[dependency-groups]
dev = [
    "ruff>=0.6.0",
    "mypy>=1.11.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF", "ASYNC", "SIM"]
ignore = [
    "E501",     # line length handled by formatter
    "ASYNC109", # `timeout` parameter is legitimate when forwarded to httpx
]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
