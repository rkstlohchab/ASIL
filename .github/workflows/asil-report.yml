name: ASIL report

# Renders the latest `asil scan` output as a markdown report and
# commits it under `docs/asil-report.md` (plus raw JSON + SARIF) so
# anyone browsing the repo on GitHub can see ASIL's current verdict
# without having to run anything locally.
#
# Triggers:
#   - push to main (so the report tracks main HEAD)
#   - daily cron (so any external signals refreshed by ingest get reflected)
#   - manual dispatch

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/asil-report.md"
      - "docs/asil.sarif"
      - "docs/asil.json"
  schedule:
    - cron: "17 4 * * *"  # 04:17 UTC daily — off-peak, avoids contention
  workflow_dispatch:

concurrency:
  group: asil-report
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/asil_dev_password
          NEO4J_PLUGINS: '["apoc"]'
        ports: ["7474:7474", "7687:7687"]
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
        options: >-
          --health-cmd "wget -q --spider http://localhost:6333/readyz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: asil
          POSTGRES_PASSWORD: asil_dev_password
          POSTGRES_DB: asil
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U asil"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: asil_dev_password
      QDRANT_URL: http://localhost:6333
      POSTGRES_DSN: postgresql://asil:asil_dev_password@localhost:5432/asil
      ASIL_LLM_PROFILE: tight
      ASIL_DAILY_BUDGET_USD: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync ASIL
        run: uv sync --all-extras

      - name: Ingest the repo
        run: uv run asil ingest .

      - name: Scan
        id: scan
        run: |
          baseline_arg=""
          if [ -f "asil-baseline.json" ]; then
            baseline_arg="--baseline asil-baseline.json"
          fi
          uv run asil scan \
            $baseline_arg \
            --gate normal \
            --sarif docs/asil.sarif \
            --pr-comment docs/asil-report.md \
            --json docs/asil.json
        continue-on-error: true

      - name: Add header to docs/asil-report.md
        run: |
          # Prepend a self-contained "what this is" header so readers
          # landing on the file via GitHub UI know they're looking at
          # an auto-refreshed snapshot, not a hand-written doc.
          mkdir -p docs
          tmp=$(mktemp)
          cat > "$tmp" <<EOF
          <!--
            This file is regenerated by .github/workflows/asil-report.yml.
            Do not edit by hand — your changes will be overwritten on the
            next push to main (or 04:17 UTC daily cron).
          -->

          # ASIL self-scan report

          ASIL ran against this repo at \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`
          on commit [\`$(git rev-parse --short HEAD)\`](https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD)).

          - Raw JSON: [\`docs/asil.json\`](./asil.json)
          - SARIF (Security tab): [\`docs/asil.sarif\`](./asil.sarif)
          - Workflow: [\`asil-report.yml\`](../.github/workflows/asil-report.yml)

          ---

          EOF
          if [ -f docs/asil-report.md ]; then
            cat docs/asil-report.md >> "$tmp"
          fi
          mv "$tmp" docs/asil-report.md

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: docs/asil.sarif
          category: asil

      - name: Commit refreshed report
        # Only commit if something actually changed — avoids empty
        # commits on no-op cron runs.
        run: |
          git config user.name "asil-bot"
          git config user.email "asil-bot@users.noreply.github.com"
          git add docs/asil-report.md docs/asil.sarif docs/asil.json
          if git diff --staged --quiet; then
            echo "no report changes — skipping commit"
            exit 0
          fi
          git commit -m "chore(asil): refresh self-scan report

          Generated by .github/workflows/asil-report.yml."
          git push
