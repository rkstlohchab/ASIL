name: ASIL report

# Renders the latest `asil scan` output as a markdown report and
# commits it under `docs/asil-report.md` (plus raw JSON + SARIF) so
# anyone browsing the repo on GitHub can see ASIL's current verdict
# without having to run anything locally.
#
# Triggers:
#   - push to main (so the report tracks main HEAD)
#   - daily cron (so any external signals refreshed by ingest get reflected)
#   - manual dispatch

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/asil-report.md"
      - "docs/asil.sarif"
      - "docs/asil.json"
      - "apps/web/public/snapshot/**"
  schedule:
    - cron: "17 4 * * *"  # 04:17 UTC daily — off-peak, avoids contention
  workflow_dispatch:

concurrency:
  group: asil-report
  cancel-in-progress: true

permissions:
  contents: write
  security-events: write  # for SARIF upload to code scanning
  actions: write          # so the final step can dispatch gh-pages.yml

jobs:
  report:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/asil_dev_password
          NEO4J_PLUGINS: '["apoc"]'
        ports: ["7474:7474", "7687:7687"]
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
        # No healthcheck — distroless qdrant image lacks wget/curl.
        # Poll from runner in a dedicated "Wait for qdrant" step.

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: asil
          POSTGRES_PASSWORD: asil_dev_password
          POSTGRES_DB: asil
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U asil"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: asil_dev_password
      QDRANT_URL: http://localhost:6333
      POSTGRES_DSN: postgresql://asil:asil_dev_password@localhost:5432/asil
      ASIL_LLM_PROFILE: tight
      # Budget defaults to 0 (no LLM calls). To enable asil.ask in
      # the dashboard snapshot, set ASIL_DAILY_BUDGET_USD as a repo
      # variable + add ANTHROPIC_API_KEY (or equivalent) as a secret.
      ASIL_DAILY_BUDGET_USD: ${{ vars.ASIL_DAILY_BUDGET_USD || '0' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # Snapshot script runs in the same CI job that started FastAPI;
      # no team key flow makes sense here. Auth is meant for real
      # multi-team deployments, not the self-scan render.
      ASIL_AUTH_DISABLE: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Wait for qdrant
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:6333/readyz > /dev/null; then
              echo "qdrant ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "qdrant never became ready"
          exit 1

      - name: Sync ASIL
        run: uv sync --all-extras

      - name: Ingest the repo
        run: uv run asil ingest .

      - name: Ingest postmortem corpus
        # Real Incident / Deployment / Alert nodes for the dashboard's
        # /incidents, causality, and replay pages. Without this step,
        # those pages render empty.
        run: |
          shopt -s nullglob
          any=0
          for pm in research/postmortems/*.yaml; do
            echo "ingest $pm"
            uv run asil postmortem ingest "$pm" || echo "  (skipped, see log)"
            any=1
          done
          if [ "$any" = "0" ]; then
            echo "no postmortems found in research/postmortems/"
          fi

      - name: Link incidents (Phase 4 causality)
        # Runs the composite causal scorer over ingested events so
        # asil.find_causes / asil.replay_incident return real ranked
        # causes instead of empty lists. The postmortem corpus is
        # all in `prod`; add more envs here if you ingest others.
        run: uv run asil temporal link prod
        continue-on-error: true

      - name: Scan
        id: scan
        run: |
          baseline_arg=""
          if [ -f "asil-baseline.json" ]; then
            baseline_arg="--baseline asil-baseline.json"
          fi
          uv run asil scan \
            $baseline_arg \
            --gate normal \
            --sarif docs/asil.sarif \
            --pr-comment docs/asil-report.md \
            --json docs/asil.json
        continue-on-error: true

      - name: Add header to docs/asil-report.md
        run: |
          # Prepend a self-contained "what this is" header so readers
          # landing on the file via GitHub UI know they're looking at
          # an auto-refreshed snapshot, not a hand-written doc.
          mkdir -p docs
          tmp=$(mktemp)
          cat > "$tmp" <<EOF
          <!--
            This file is regenerated by .github/workflows/asil-report.yml.
            Do not edit by hand — your changes will be overwritten on the
            next push to main (or 04:17 UTC daily cron).
          -->

          # ASIL self-scan report

          ASIL ran against this repo at \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`
          on commit [\`$(git rev-parse --short HEAD)\`](https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD)).

          - Raw JSON: [\`docs/asil.json\`](./asil.json)
          - SARIF (Security tab): [\`docs/asil.sarif\`](./asil.sarif)
          - Workflow: [\`asil-report.yml\`](../.github/workflows/asil-report.yml)

          ---

          EOF
          if [ -f docs/asil-report.md ]; then
            cat docs/asil-report.md >> "$tmp"
          fi
          mv "$tmp" docs/asil-report.md

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: docs/asil.sarif
          category: asil

      - name: Start FastAPI in the background
        # The dashboard fixtures are populated by hitting live API
        # endpoints (REST + MCP tools). Start a server bound to
        # localhost so the snapshot script can reach it.
        run: |
          uv run uvicorn asil_api.main:app --host 127.0.0.1 --port 8000 \
            > /tmp/asil-api.log 2>&1 &
          echo $! > /tmp/asil-api.pid
          # Give uvicorn a beat to bind. The snapshot script does its
          # own /health poll, so we don't need a tight wait here.
          sleep 2

      - name: Snapshot dashboard fixtures
        run: uv run python scripts/snapshot_dashboard.py --base http://127.0.0.1:8000

      - name: Stop FastAPI
        if: always()
        run: |
          if [ -f /tmp/asil-api.pid ]; then
            kill "$(cat /tmp/asil-api.pid)" 2>/dev/null || true
          fi
          echo "--- last 50 lines of asil-api.log ---"
          tail -n 50 /tmp/asil-api.log || true

      - name: Commit refreshed report + dashboard fixtures
        # Only commit if something actually changed — avoids empty
        # commits on no-op cron runs. Includes the new fixtures so
        # gh-pages.yml picks them up automatically.
        run: |
          git config user.name "asil-bot"
          git config user.email "asil-bot@users.noreply.github.com"
          # In case the bot's last push raced with another bot push,
          # rebase before adding to avoid non-fast-forward rejection.
          git pull --rebase origin main || true
          git add docs/asil-report.md docs/asil.sarif docs/asil.json apps/web/public/snapshot
          if git diff --staged --quiet; then
            echo "no report changes — skipping commit"
            exit 0
          fi
          git commit -m "chore(asil): refresh self-scan report + dashboard fixtures

          Generated by .github/workflows/asil-report.yml."
          git push

      - name: Dispatch gh-pages.yml so the new fixtures redeploy
        # GitHub blocks GITHUB_TOKEN-driven pushes from triggering other
        # workflows (recursion guard). Without this nudge, gh-pages
        # never sees the bot's fixture commits and the live dashboard
        # stays stale. Best-effort — failure here doesn't fail the run.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run gh-pages.yml --ref main || echo "(dispatch failed — site may stay stale)"
