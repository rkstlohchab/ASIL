name: ASIL scan

# CI integration template. Drop into any repo that wants ASIL's drift +
# recent-incident signals on every PR. Requires:
#   - A reachable ASIL instance (we spin one up via docker-compose below).
#   - A committed `asil-baseline.json` if you want drift to be meaningful;
#     otherwise every observed dependency reads as "new" on first run.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs on the same branch so a flurry of pushes doesn't
# saturate the runner pool.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # for the PR comment
  security-events: write  # for SARIF upload to code scanning

jobs:
  scan:
    runs-on: ubuntu-latest

    # ASIL needs the docker stack. Using GitHub-provided service
    # containers keeps the workflow self-contained — no remote ASIL
    # server required. Local-only data, scrapped at job end.
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/asil_dev_password
          NEO4J_PLUGINS: '["apoc"]'
        ports: ["7474:7474", "7687:7687"]
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
        # No healthcheck — the qdrant image is a distroless variant
        # without wget/curl, so Docker's HEALTHCHECK can't run inside.
        # We poll from the runner side in a dedicated "Wait for qdrant"
        # step below.

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: asil
          POSTGRES_PASSWORD: asil_dev_password
          POSTGRES_DB: asil
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U asil"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # so `git log` finds merge commits for `asil external github`

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Wait for qdrant
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:6333/readyz > /dev/null; then
              echo "qdrant ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "qdrant never became ready"
          exit 1

      - name: Sync ASIL
        run: uv sync

      - name: Ingest the changed repo
        run: |
          uv run asil ingest .
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: asil_dev_password
          QDRANT_URL: http://localhost:6333
          POSTGRES_DSN: postgresql://asil:asil_dev_password@localhost:5432/asil

      - name: Scan
        id: scan
        run: |
          baseline_arg=""
          if [ -f "${{ github.workspace }}/asil-baseline.json" ]; then
            baseline_arg="--baseline ${{ github.workspace }}/asil-baseline.json"
          else
            echo "::warning::No asil-baseline.json found — drift will treat every observed dependency as new. Run the 'ASIL bootstrap' workflow to seed one."
          fi
          uv run asil scan \
            $baseline_arg \
            --gate normal \
            --sarif asil.sarif \
            --pr-comment asil-pr-comment.md \
            --json asil.json
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: asil_dev_password
          QDRANT_URL: http://localhost:6333
          POSTGRES_DSN: postgresql://asil:asil_dev_password@localhost:5432/asil
        # Don't kill the workflow on a gate failure — we still want the PR
        # comment + SARIF upload. The final `Enforce gate` step does the
        # actual failing.
        continue-on-error: true

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('asil-pr-comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const prior = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## ASIL scan'));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: asil.sarif
          category: asil

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asil-scan
          path: |
            asil.json
            asil.sarif
            asil-pr-comment.md

      - name: Enforce gate
        # Only fail the workflow on PR runs. On push-to-main we still
        # want the SARIF / report to land in Security tab + artifacts
        # even if the gate would have tripped.
        if: github.event_name == 'pull_request' && steps.scan.outcome != 'success'
        run: |
          echo "ASIL scan gate failed — see the PR comment for details."
          exit 1
