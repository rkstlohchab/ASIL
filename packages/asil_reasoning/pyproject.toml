[project]
name = "asil-reasoning"
version = "0.0.1"
description = "ASIL reasoning pipeline — scorer, verifier, and (later) the deterministic 8-step pipeline."
requires-python = ">=3.12"
dependencies = [
    "asil-core",
    "asil-memory",
    "pydantic>=2.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asil_reasoning"]

[tool.uv.sources]
asil-core = { workspace = true }
asil-memory = { workspace = true }
