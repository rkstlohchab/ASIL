[project]
name = "asil-fix"
version = "0.0.1"
description = "ASIL Phase 8 — deterministic fix pipeline. Patch generator constrained by the causal chain, sandbox executor, audit log."
requires-python = ">=3.12"
dependencies = [
    "asil-core",
    "asil-memory",
    "asil-replay",
    "asil-reasoning",
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asil_fix"]

[tool.uv.sources]
asil-core = { workspace = true }
asil-memory = { workspace = true }
asil-replay = { workspace = true }
asil-reasoning = { workspace = true }
