[project]
name = "asil-memory"
version = "0.0.1"
description = "ASIL memory: Neo4j knowledge graph + Qdrant vectors + episodic store."
requires-python = ">=3.12"
dependencies = [
    "asil-core",
    "neo4j>=5.24.0",
    "qdrant-client>=1.12.0",
    "psycopg[binary]>=3.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asil_memory"]

[tool.uv.sources]
asil-core = { workspace = true }
