[project]
name = "asil-ingest-agents"
version = "0.0.1"
description = "Transcript ingesters for Claude Code, Cursor, Aider, OpenHands, etc."
requires-python = ">=3.12"
dependencies = [
    "asil-core",
    "asil-memory",
    "watchdog>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asil_ingest_agents"]

[tool.uv.sources]
asil-core = { workspace = true }
asil-memory = { workspace = true }
