[project]
name = "asil-ingest"
version = "0.0.1"
description = "ASIL ingestion: repo cloners, Tree-sitter parsers, SCIP indexers, graph builders."
requires-python = ">=3.12"
dependencies = [
    "asil-core",
    "asil-memory",
    "pydantic>=2.9.0",
    "tree-sitter>=0.23.0",
    "tree-sitter-language-pack>=0.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asil_ingest"]

[tool.uv.sources]
asil-core = { workspace = true }
asil-memory = { workspace = true }
