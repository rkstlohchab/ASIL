[project]
name = "asil-replay"
version = "0.0.1"
description = "ASIL execution replay engine — reconstructs incident timelines, cascades, and top causes from the causal graph."
requires-python = ">=3.12"
dependencies = [
    "asil-core",
    "asil-memory",
    "asil-temporal",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asil_replay"]

[tool.uv.sources]
asil-core = { workspace = true }
asil-memory = { workspace = true }
asil-temporal = { workspace = true }
